name: CI/CD to DockerHub and GitOps Update

on:
  push:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      MANIFEST_REPO: "${{ github.repository_owner }}/k3s-local-manifest"
      DOCKER_USER: ${{ secrets.DOCKERHUB_USERNAME }}
      GH_TOKEN: ${{ secrets.GH_TOKEN }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name:
          Get the frontend version from file and git sha
          #  Odczytujemy wersję z pliku tekstowego zamiast
        id: version_file
        run: |
          # plik 'version_frontend' 
          # xargs usuwa ewentualne białe znaki/entery
          APP_VER=$(cat version_frontend | xargs)
          echo "APP_VERSION=$APP_VER" >> $GITHUB_OUTPUT

      # --- 1. BUDOWANIE OBRAZÓW ---
      - name: Build and push Backend image
        run: |
          docker build -t ${{ env.DOCKER_USER }}/backend:${{ github.sha }} \
          -t ${{ env.DOCKER_USER }}/backend:latest \
          -f backend/backend.Dockerfile ./backend
          docker push ${{ env.DOCKER_USER }}/backend --all-tags

      - name: Build and push Frontend image
        run: |
          docker build --build-arg VITE_GIT_SHA=${{ github.sha }} \
          --build-arg VITE_APP_VERSION=${{ steps.version_file.outputs.APP_VERSION }} \
          -t ${{ env.DOCKER_USER }}/frontend:${{ github.sha }} \
          -t ${{ env.DOCKER_USER }}/frontend:latest \
          -t ${{ env.DOCKER_USER }}/frontend:${{ steps.version_file.outputs.APP_VERSION }} \
          -f frontend/frontend.Dockerfile ./frontend
          docker push ${{ env.DOCKER_USER }}/frontend --all-tags

      # --- 2. PRZYGOTOWANIE REPOZYTORIUM MANIFESTÓW ---
      - name: Checkout Manifest Repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.MANIFEST_REPO }}
          token: ${{ env.GH_TOKEN }}
          path: manifest-repo

      - name: Configure Git
        working-directory: manifest-repo
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      # --- 3. AKTUALIZACJA DEV (AUTOMATYCZNA PRZEZ KUSTOMIZE) ---
      - name: Update Dev Manifests
        working-directory: manifest-repo/k8s/overlays/dev
        run: |
          # Aktualizacja obrazów w pliku kustomization.yaml
          kustomize edit set image ${{ env.DOCKER_USER }}/backend=${{ env.DOCKER_USER }}/backend:${{ github.sha }}
          kustomize edit set image ${{ env.DOCKER_USER }}/frontend=${{ env.DOCKER_USER }}/frontend:${{ github.sha }}

          git add kustomization.yaml
          if git diff --staged --quiet; then
            echo "No changes for Dev"
          else
            git commit -m "chore(dev): update images to ${{ steps.version_file.outputs.APP_VERSION }} (sha: ${{ steps.version_file.outputs.SHA }})"
            git push origin main
          fi

      # --- 4. AKTUALIZACJA PROD (PULL REQUEST PRZEZ KUSTOMIZE) ---
      - name: Update Prod Manifests and Create PR
        working-directory: manifest-repo
        run: |
          BRANCH_NAME="prod-release-${{ steps.version_file.outputs.APP_VERSION }} (sha: ${{ steps.version_file.outputs.SHA }})"
          git checkout -b $BRANCH_NAME

          # Przejdź do folderu prod i użyj kustomize
          cd k8s/overlays/prod
          kustomize edit set image ${{ env.DOCKER_USER }}/backend=${{ env.DOCKER_USER }}/backend:${{ github.sha }}
          kustomize edit set image ${{ env.DOCKER_USER }}/frontend=${{ env.DOCKER_USER }}/frontend:${{ github.sha }}

          git add kustomization.yaml
          if git diff --staged --quiet; then
            echo "No changes for Prod"
          else
            git commit -m "chore(prod): release update to ${{ steps.version_file.outputs.APP_VERSION }} (sha: ${{ steps.version_file.outputs.SHA }})"
            git push origin $BRANCH_NAME
            
            # Tworzenie PR za pomocą GitHub CLI
            gh pr create \
              --title "🚀 Prod Release: ${{ steps.version_file.outputs.APP_VERSION }} (sha: ${{ steps.version_file.outputs.SHA }}" \
              --body "Automated production update using Kustomize. Please merge after verifying Dev environment." \
              --base main \
              --head $BRANCH_NAME \
              --repo ${{ env.MANIFEST_REPO }}
          fi
